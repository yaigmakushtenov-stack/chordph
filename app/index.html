<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#0f1117">
    <meta name="mobile-web-app-capable" content="yes">
    <title>Chord.ph</title>
    <style>
        :root {
            --bg: #0f1117;
            --text: #e8eaf0;
            --muted: #8b93a7;
            --faint: #566072;
            --accent: #4f8cff;
            --accent-2: #9b6bff;
            --danger: #e94560;
            --gold: #f5c518;
            --hairline: rgba(255, 255, 255, 0.07);
            --grad: linear-gradient(90deg, var(--accent), var(--accent-2));
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

        body {
            background: radial-gradient(1000px 480px at 50% -140px, #171c28 0%, var(--bg) 60%);
            background-color: var(--bg);
            color: var(--text);
            font-family: "Segoe UI", system-ui, -apple-system, sans-serif;
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
        }

        ::selection { background: rgba(79, 140, 255, 0.35); }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-thumb { background: #232a38; border-radius: 4px; }

        .wrap { max-width: 640px; margin: 0 auto; padding: 0 20px 80px; }

        /* ---- tappable words: the core control idiom ---- */
        .tap {
            display: inline-block;
            color: var(--muted);
            cursor: pointer;
            user-select: none;
            padding: 8px 2px;
            transition: color .15s;
            background: none; border: none; font: inherit;
        }
        .tap:hover { color: var(--text); }
        .tap.on { color: var(--accent); }
        .tap.primary { color: var(--accent); font-weight: 600; }
        .tap.primary:hover { color: #7caaff; }
        .tap.danger { color: var(--danger); }
        .tap.big { font-size: 17px; padding: 10px 4px; }
        .tap:disabled { color: var(--faint); cursor: default; }

        .glyph { font-size: 18px; padding: 8px 10px; }

        .wordmark {
            font-weight: 750;
            letter-spacing: -0.3px;
            background: var(--grad);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            width: fit-content;
        }

        /* ---- top bar: quiet ---- */
        .bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 14px 0 8px;
            position: sticky;
            top: 0;
            background: rgba(15, 17, 23, 0.88);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            z-index: 50;
        }
        .bar .wordmark { font-size: 17px; }
        .bar-side { min-width: 64px; }
        .bar-side.right { text-align: right; }

        /* ---- search: a hairline, not a box ---- */
        .search {
            width: 100%;
            background: none;
            border: none;
            border-bottom: 1px solid var(--hairline);
            color: var(--text);
            font-size: 16px;
            padding: 10px 2px;
            outline: none;
            margin: 6px 0 4px;
            transition: border-color .2s;
        }
        .search:focus { border-bottom-color: var(--accent); }
        .search::placeholder { color: var(--faint); }

        /* ---- song list: rows, hairlines, air ---- */
        .row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 14px 2px;
            border-bottom: 1px solid var(--hairline);
            cursor: pointer;
        }
        .row-main { flex: 1; min-width: 0; }
        .row-title { font-size: 16px; font-weight: 600; }
        .row-sub { font-size: 13px; color: var(--muted); margin-top: 2px; }
        .row-sub .key { color: var(--accent); font-weight: 600; }
        .row .star { font-size: 18px; color: var(--faint); padding: 8px 2px 8px 14px; background: none; border: none; cursor: pointer; }
        .row .star.on { color: var(--gold); }
        .row-action { color: var(--danger); font-size: 13px; padding: 8px 0 8px 14px; background: none; border: none; cursor: pointer; }
        .row-actions { display: flex; align-items: center; gap: 4px; flex-shrink: 0; }
        .row-action.danger { color: var(--danger); }

        /* drag-to-reorder */
        .setlist-drag-row { touch-action: pan-y; -webkit-user-select: none; user-select: none; -webkit-touch-callout: none; }
        .setlist-drag-row .row-main { cursor: grab; }
        /* while lifting/dragging a row, kill text selection + tap highlight everywhere */
        body.dragging, body.dragging * { -webkit-user-select: none !important; user-select: none !important; -webkit-touch-callout: none !important; }
        #setlist-songs { position: relative; }
        .drag-clone {
            position: fixed;
            z-index: 500;
            margin: 0;
            pointer-events: none;
            background: #1b2130;
            border: 1px solid var(--accent);
            border-radius: 12px;
            box-shadow: 0 14px 34px rgba(0, 0, 0, 0.55);
            padding: 0 12px;
            opacity: 0.96;
        }
        .drop-indicator {
            position: absolute;
            left: 0; right: 0;
            height: 2px;
            background: var(--accent);
            border-radius: 2px;
            box-shadow: 0 0 8px rgba(79, 140, 255, 0.6);
            pointer-events: none;
        }

        .empty { color: var(--faint); text-align: center; padding: 48px 0; font-size: 14px; line-height: 1.7; }

        /* ---- community: review queue, versions, voting ---- */
        .review-badge {
            display: inline-block; min-width: 18px; padding: 0 5px; margin-left: 4px;
            font-size: 11px; line-height: 18px; text-align: center; border-radius: 9px;
            background: var(--accent); color: #fff; font-weight: 700;
        }
        .sub-card {
            background: var(--panel-2, #171c28); border: 1px solid var(--border, #263041);
            border-radius: 12px; padding: 14px 16px; margin-bottom: 14px;
        }
        .sub-card .sc-title { font-size: 16px; font-weight: 650; }
        .sub-card .sc-by { font-size: 12px; color: var(--muted); margin-top: 2px; }
        .sub-card .sc-tags { display: flex; flex-wrap: wrap; gap: 6px; margin: 8px 0; }
        .sc-tag {
            font-size: 11px; padding: 2px 8px; border-radius: 999px;
            background: rgba(79,140,255,0.14); color: #9dc0ff; border: 1px solid rgba(79,140,255,0.3);
        }
        .sub-card pre.sc-chart {
            white-space: pre-wrap; font-size: 12px; line-height: 1.5; max-height: 220px; overflow: auto;
            background: rgba(0,0,0,0.22); border-radius: 8px; padding: 10px; margin: 6px 0;
        }
        .sub-card .sc-actions { display: flex; gap: 18px; margin-top: 8px; }
        .vote-btn {
            display: inline-flex; align-items: center; gap: 6px; font: inherit; cursor: pointer;
            background: none; border: 1px solid var(--border, #263041); color: var(--muted);
            border-radius: 999px; padding: 4px 12px;
        }
        .vote-btn.voted { border-color: var(--accent); color: var(--accent); background: rgba(79,140,255,0.12); }
        #chart-versions { margin-top: 6px; }
        .tag-filter {
            display: flex; gap: 8px; overflow-x: auto; padding: 2px 0 10px;
            -webkit-overflow-scrolling: touch; scrollbar-width: none;
        }
        .tag-filter::-webkit-scrollbar { display: none; }
        .tag-chip {
            flex: 0 0 auto; font: inherit; font-size: 12px; cursor: pointer;
            padding: 5px 12px; border-radius: 999px; white-space: nowrap;
            background: rgba(255,255,255,0.04); border: 1px solid var(--border, #263041); color: var(--muted);
        }
        .tag-chip.on { background: rgba(79,140,255,0.15); border-color: var(--accent); color: var(--accent); }
        #app-toast {
            position: fixed; left: 50%; bottom: 26px; transform: translateX(-50%) translateY(20px);
            background: #10141d; border: 1px solid var(--border, #263041); color: var(--text, #e8ecf3);
            padding: 11px 18px; border-radius: 999px; font-size: 13px; max-width: 88vw; text-align: center;
            box-shadow: 0 12px 30px rgba(0,0,0,0.5); opacity: 0; pointer-events: none;
            transition: opacity .2s, transform .2s; z-index: 900;
        }
        #app-toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

        .section-label {
            font-size: 11px;
            color: var(--faint);
            text-transform: uppercase;
            letter-spacing: 1.4px;
            margin: 22px 0 4px;
        }

        /* ---- chart view ---- */
        .chart-head { margin-top: 6px; }
        .chart-title { font-size: 24px; font-weight: 750; letter-spacing: -0.4px; }
        .chart-meta { font-size: 14px; color: var(--muted); margin-top: 3px; }
        .chart-meta .key { color: var(--accent); font-weight: 650; cursor: pointer; }

        /* control dock stays pinned to the top while the chart scrolls,
           so transpose / text / scroll are always a tap away */
        .control-dock {
            position: sticky;
            top: 0;
            z-index: 40;
            background: var(--bg);
            margin-top: 14px;
        }
        #view-chart .bar { position: static; }
        .controls {
            display: flex;
            gap: 18px;
            flex-wrap: wrap;
            padding: 8px 0;
            border-top: 1px solid var(--hairline);
            border-bottom: 1px solid var(--hairline);
            font-size: 14px;
        }
        .controls .tap.on { position: relative; }
        .controls .tap.on::after {
            content: "";
            position: absolute;
            left: 0; right: 0; bottom: -9px;
            height: 2px;
            background: var(--accent);
            border-radius: 2px;
        }

        /* ---- disclosure layer: appears under the control words ---- */
        .layer {
            display: none;
            padding: 10px 0 12px;
            border-bottom: 1px solid var(--hairline);
            font-size: 15px;
            align-items: center;
            gap: 14px;
            flex-wrap: wrap;
            animation: fadeIn .18s ease;
        }
        .layer.open { display: flex; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(-3px); } to { opacity: 1; transform: none; } }
        .layer .val { color: var(--text); font-weight: 650; min-width: 30px; text-align: center; display: inline-block; }
        .layer .lbl { color: var(--faint); font-size: 12px; }
        .click-dot { width: 14px; height: 14px; border-radius: 50%; background: #2a3040; display: inline-block; transition: background .05s; }
        .click-dot.pulse { animation: clickPulse .16s ease-out; }
        @keyframes clickPulse { 0% { transform: scale(1.7); } 100% { transform: scale(1); } }
        .capo-opt { padding: 8px 4px; }
        .capo-opt b { color: var(--text); font-weight: 650; }
        .capo-opt.on b { color: var(--accent); }
        .capo-opt span { color: var(--faint); font-size: 12px; }

        /* ---- the chart itself: the hero, no box ---- */
        pre.chart {
            font-family: "Cascadia Mono", Consolas, "Roboto Mono", monospace;
            font-size: 16px;
            line-height: 1.9;
            white-space: pre-wrap;
            color: var(--text);
            padding: 18px 0 10px;
        }
        /* guitar chord diagram reference strip */
        .chord-strip {
            display: flex; gap: 14px; overflow-x: auto;
            padding: 14px 0 12px; margin-top: 8px;
            border-bottom: 1px solid var(--hairline);
        }
        .chord-dia { flex-shrink: 0; text-align: center; }
        .cd-name { font-size: 12px; font-weight: 700; color: var(--accent); margin-bottom: 3px; }
        .chord-strip .cd-missing { font-size: 11px; color: var(--faint); align-self: center; }
        pre.chart .chord-line { color: var(--accent); font-weight: 700; }
        pre.chart .sec-head {
            color: var(--accent-2);
            font-weight: 700;
            font-size: 0.82em;
            letter-spacing: 1.6px;
            text-transform: uppercase;
        }

        .medley-sep {
            border-top: 1px dashed rgba(155, 107, 255, 0.4);
            margin-top: 10px;
            padding-top: 14px;
        }
        .medley-tag { font-size: 11px; color: var(--accent-2); text-transform: uppercase; letter-spacing: 1.4px; }
        .medley-head { display: flex; justify-content: space-between; align-items: baseline; }
        .medley-title { font-size: 17px; font-weight: 700; margin-top: 4px; }
        .medley-sub { font-size: 12px; color: var(--muted); }

        /* ---- drawer: minimal sheet of words ---- */
        .scrim {
            display: none;
            position: fixed; inset: 0;
            background: rgba(5, 7, 12, 0.6);
            backdrop-filter: blur(2px);
            -webkit-backdrop-filter: blur(2px);
            z-index: 200;
        }
        .scrim.open { display: block; }

        .drawer {
            position: fixed;
            top: 0; left: -280px;
            width: 250px;
            height: 100%;
            background: rgba(18, 21, 30, 0.97);
            backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px);
            border-right: 1px solid var(--hairline);
            z-index: 300;
            padding: 26px 24px;
            transition: left .26s cubic-bezier(.2, .8, .2, 1);
            display: flex;
            flex-direction: column;
        }
        .drawer.open { left: 0; }
        .drawer .wordmark { font-size: 20px; margin-bottom: 28px; }
        .drawer-nav { display: flex; flex-direction: column; gap: 4px; }
        .drawer-nav .tap { font-size: 16px; padding: 10px 0; text-align: left; }
        .drawer-hr { border: none; border-top: 1px solid var(--hairline); margin: 14px 0; }

        /* profile row = the settings entrance (bottom of the menu) */
        .drawer-profile {
            margin-top: auto;
            display: flex;
            align-items: center;
            gap: 12px;
            width: 100%;
            padding: 12px 10px;
            background: none;
            border: none;
            border-top: 1px solid var(--hairline);
            cursor: pointer;
            text-align: left;
            transition: background .15s;
        }
        .drawer-profile:hover { background: rgba(255, 255, 255, 0.03); }
        .dp-text { flex: 1; min-width: 0; display: flex; flex-direction: column; }
        .dp-name { font-size: 14px; font-weight: 600; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .dp-instrument { font-size: 12px; color: var(--faint); margin-top: 1px; }
        .dp-gear { font-size: 17px; color: var(--muted); flex-shrink: 0; transition: color .2s, transform .3s; }
        .drawer-profile:hover .dp-gear { color: var(--accent); transform: rotate(40deg); }

        /* ---- bottom sheet: modals without boxes-in-boxes ---- */
        .sheet-scrim {
            display: none;
            position: fixed; inset: 0;
            background: rgba(5, 7, 12, 0.65);
            backdrop-filter: blur(3px);
            -webkit-backdrop-filter: blur(3px);
            z-index: 400;
            align-items: flex-end;
            justify-content: center;
        }
        .sheet-scrim.open { display: flex; }
        .sheet {
            width: 100%;
            max-width: 640px;
            max-height: 86vh;
            overflow-y: auto;
            background: #141821;
            border-top: 1px solid var(--hairline);
            border-radius: 18px 18px 0 0;
            padding: 20px 24px 34px;
            animation: sheetUp .22s cubic-bezier(.2, .8, .2, 1);
        }
        @keyframes sheetUp { from { transform: translateY(40px); opacity: .5; } to { transform: none; opacity: 1; } }
        .sheet-title { font-size: 16px; font-weight: 700; margin-bottom: 14px; }
        .sheet-actions { display: flex; justify-content: flex-end; gap: 22px; margin-top: 18px; }
        /* sticky header inside a scrolling sheet (long lists keep Done in reach) */
        .sheet-head {
            position: sticky; top: 0; z-index: 5;
            background: #141821;
            margin: -20px -24px 4px; padding: 16px 24px 8px;
            border-bottom: 1px solid var(--hairline);
        }
        .sheet-head .sheet-title { margin: 0; }

        /* tall sheet: fixed height so it doesn't move/resize as search narrows
           the list. Header pinned, list scrolls inside. */
        .sheet.sheet-tall {
            height: 85vh; max-height: 85vh;
            padding: 0; overflow: hidden;
            display: flex; flex-direction: column;
        }
        .sheet-tall .sheet-head {
            position: static; margin: 0; flex-shrink: 0;
            padding: 18px 24px 10px;
        }
        .sheet-scroll { flex: 1; overflow-y: auto; padding: 4px 24px 24px; }

        /* dropdown menu anchored under a top-bar button (⋯) */
        .menu-scrim { display: none; position: fixed; inset: 0; z-index: 420; }
        .menu-scrim.open { display: block; }
        .menu-pop {
            position: fixed; min-width: 210px; max-width: 82vw;
            background: #141821; border: 1px solid var(--hairline);
            border-radius: 12px; box-shadow: 0 16px 40px rgba(0, 0, 0, 0.55);
            padding: 6px; transform-origin: top right;
            animation: menuDrop .15s cubic-bezier(.2, .8, .2, 1);
        }
        @keyframes menuDrop { from { opacity: 0; transform: translateY(-8px) scale(.97); } to { opacity: 1; transform: none; } }
        .menu-item {
            display: flex; align-items: center; gap: 11px; width: 100%;
            padding: 12px 12px; background: none; border: none; color: var(--text);
            font-size: 15px; text-align: left; cursor: pointer; border-radius: 8px;
        }
        .menu-item:hover { background: rgba(255, 255, 255, 0.05); }
        .menu-item.danger { color: var(--danger); }
        .menu-item .mi-ico { width: 18px; text-align: center; flex-shrink: 0; color: var(--muted); }
        .menu-item.danger .mi-ico { color: var(--danger); }

        .field {
            width: 100%;
            background: none;
            border: none;
            border-bottom: 1px solid var(--hairline);
            color: var(--text);
            font-size: 15px;
            padding: 11px 2px;
            outline: none;
            margin-bottom: 6px;
            transition: border-color .2s;
        }
        .field:focus { border-bottom-color: var(--accent); }
        .field::placeholder { color: var(--faint); }
        select.field { color: var(--text); background-color: #141821; }
        select.field:invalid, select.field option[value=""] { color: var(--faint); }
        textarea.field {
            font-family: "Cascadia Mono", Consolas, monospace;
            font-size: 13px;
            line-height: 1.6;
            min-height: 180px;
            resize: vertical;
            border: 1px solid var(--hairline);
            border-radius: 10px;
            padding: 12px;
            margin-top: 8px;
        }
        .field-row { display: flex; gap: 18px; }
        .field-row .field { flex: 1; }
        .form-error { color: var(--danger); font-size: 12px; margin-top: 6px; display: none; }

        .chip-row { display: flex; flex-wrap: wrap; gap: 4px 18px; margin: 6px 0 10px; }
        .chip { color: var(--muted); cursor: pointer; padding: 8px 2px; font-size: 15px; background: none; border: none; }
        .chip.on { color: var(--accent); font-weight: 650; }

        /* ---- onboarding ---- */
        #view-onboarding {
            min-height: 100vh;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 24px;
        }
        #view-onboarding .wordmark { font-size: 38px; margin: 0 auto; }
        .ob-tagline { color: var(--muted); font-size: 14px; margin: 8px 0 44px; }
        .ob-label { font-size: 15px; font-weight: 650; margin-bottom: 6px; }
        #view-onboarding .chip-row { justify-content: center; margin-bottom: 30px; }
        #view-onboarding .field { max-width: 280px; text-align: center; margin-bottom: 34px; }

        .view { display: none; }
        .view.active { display: block; }

        /* =========================================================
           DESKTOP: persistent sidebar, centered reading column
           ========================================================= */
        @media (min-width: 980px) {
            .scrim { display: none !important; }
            .drawer {
                left: 0;
                transition: none;
                box-shadow: none;
                background: rgba(15, 17, 23, 0.6);
            }
            .drawer .drawer-nav .tap { font-size: 15px; padding: 9px 0; }
            .menu-btn { display: none !important; }
            .bar .wordmark { display: none; }
            .bar {
                background: none;
                backdrop-filter: none;
                -webkit-backdrop-filter: none;
                border-bottom: 1px solid var(--hairline);
                padding: 18px 0 10px;
            }
            .wrap {
                margin-left: max(250px, calc((100vw - 800px) / 2));
                margin-right: auto;
                max-width: 800px;
                padding: 0 40px 100px;
            }
            /* onboarding + logged-out: no sidebar */
            body.pre-app .drawer { display: none; }
            pre.chart { font-size: 17px; }
            .row { padding: 15px 2px; }
            .row:hover .row-title { color: var(--accent); }
        }
    </style>
</head>
<body>

<div class="scrim" id="scrim" onclick="closeDrawer()"></div>

<nav class="drawer" id="drawer">
    <div class="wordmark">Chord.ph</div>
    <div class="drawer-nav">
        <button class="tap" id="nav-songs" onclick="go('songs')">Songs</button>
        <button class="tap" id="nav-favorites" onclick="go('favorites')">Favorites</button>
        <button class="tap" id="nav-setlists" onclick="go('setlists')">Setlists</button>
        <hr class="drawer-hr">
        <button class="tap" id="nav-submit" onclick="openSubmitSheet()">Submit a chart</button>
        <button class="tap" id="nav-review" onclick="go('review')" style="display:none;">Review queue <span id="review-badge" class="review-badge" style="display:none;"></span></button>
        <button class="tap" onclick="location.href='/analyzer/'">Key &amp; BPM Analyzer</button>
    </div>
    <button class="drawer-profile" onclick="openSettings()">
        <span class="dp-text">
            <span class="dp-name" id="profile-name"></span>
            <span class="dp-instrument" id="profile-instrument"></span>
        </span>
        <span class="dp-gear">&#9881;</span>
    </button>
</nav>

<div id="view-onboarding">
    <div class="wordmark">Chord.ph</div>
    <div class="ob-tagline">Your chords. Your key. Your music.</div>
    <div class="ob-label">What do you play?</div>
    <div class="chip-row" id="ob-instruments"></div>
    <div class="ob-label">What should we call you?</div>
    <input class="field" id="ob-name" placeholder="Your name" autocomplete="off">
    <button class="tap primary big" id="ob-go" onclick="finishOnboarding()">Let's play &rarr;</button>
</div>

<div class="view" id="view-songs">
    <div class="wrap">
        <div class="bar">
            <span class="bar-side"><button class="tap glyph menu-btn" onclick="openDrawer()" aria-label="Open menu">&#9776;</button></span>
            <span class="wordmark">Chord.ph</span>
            <span class="bar-side right"><button class="tap glyph" onclick="openSongSheet()" aria-label="Add song">+</button></span>
        </div>
        <input class="search" id="search" placeholder="Search songs, artists, tags&hellip;" oninput="renderSongList()" autocomplete="off">
        <div id="tag-filter" class="tag-filter"></div>
        <div id="song-list"></div>
    </div>
</div>

<div class="view" id="view-favorites">
    <div class="wrap">
        <div class="bar">

var SHARPS = ['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];
var FLATS  = ['C','Db','D','Eb','E','F','Gb','G','Ab','A','Bb','B'];

    { shape: 'E', index: 4 }, { shape: 'D', index: 2 }, { shape: 'C', index: 0 },
    { shape: 'A', index: 9 }, { shape: 'G', index: 7 }

    'Lead Guitar': 'guitarist', 'Rhythm Guitar': 'guitarist', 'Bass': 'bassist',
    'Keyboard': 'keys', 'Drums': 'drummer', 'Vocalist': 'vocalist'
};

function getNoteIndex(note) {
    var idx = SHARPS.indexOf(note);
    if (idx !== -1) return idx;
    return FLATS.indexOf(note);
}
function noteName(index) { return state.useFlats ? FLATS[index] : SHARPS[index]; }
function transposeNoteBySteps(noteStr, steps) {
    var baseIndex = getNoteIndex(noteStr);
    if (baseIndex === -1) return noteStr;
    return noteName((baseIndex + steps + 120) % 12);
}

    return text.replace(/\b([A-G][b#]?)((?:m|maj|min|sus|add|dim|aug|[0-9])*)(\/([A-G][b#]?))?(?=\s|\[|$)/gm,
        function(match, root, quality, slashFull, bassNote) {
            var transposedRoot = transposeNoteBySteps(root, steps);
            var transposedBass = bassNote ? '/' + transposeNoteBySteps(bassNote, steps) : '';
            return transposedRoot + (quality || '') + transposedBass;
        });
}
function getStepsToReach(fromKey, toKeyNote) {
    var fromIndex = getNoteIndex(fromKey);
    var toIndex = getNoteIndex(toKeyNote);
    if (fromIndex === -1 || toIndex === -1) return 0;
    return (toIndex - fromIndex + 12) % 12;
}

// Diatonic degrees are plain; chromatic ones get flat/sharp (b3, #4…).

        function(match, root, quality, slashFull, bassNote) {

/* Split a chart into sections by [Label] headers. Each section keeps its

function parseSections(chart) {
    var lines = chart.split('\n');
    var sections = [];
    var cur = null;
    lines.forEach(function(line) {
        if (/^\s*\[.*\]\s*$/.test(line)) {
            if (cur) sections.push(cur);
            cur = { label: line.trim().replace(/^\[|\]$/g, ''), lines: [line] };
        } else {
            if (!cur) cur = { label: 'Intro', lines: [] };
            cur.lines.push(line);

    });

    return sections.map(function(s) { return { label: s.label, text: s.lines.join('\n').replace(/^\n+|\n+$/g, '') }; });

/* Build the chart text for a medley entry: whole song, or only the chosen

function medleyChartText(song, sectionIndices) {
    if (!sectionIndices) return song.chart;

    return text.split('\n').map(function(line) {

    return text.split('\n').map(function(line) {
        if (/^\s*\[.*\]\s*$/.test(line)) return '<span class="sec-head">' + esc(line) + '</span>';
        if (isChordLine(line)) return '<span class="chord-line">' + esc(toNashville(line, keyRootIndex)) + '</span>';

function localSnapshot() {

        updated_at: state.updatedAt || 0
    };
}
function applySnapshot(snap) {
    if (snap.profile) state.profile = snap.profile;
    state.customs = snap.customs || [];
    state.favorites = snap.favorites || [];
    state.setlists = snap.setlists || [];

    }

    // persist without bumping the timestamp or re-queueing a push
    localStorage.setItem('chordph2_profile', JSON.stringify(state.profile));
    localStorage.setItem('chordph2_customs', JSON.stringify(state.customs));

    localStorage.setItem('chordph2_updated', String(state.updatedAt));

/* Union merge: never drops a song/setlist from either side; for the same
   id, the document with the newer top-level updated_at wins. */
function mergeData(local, cloud) {
    if (!cloud) return local;
    if (!local) return cloud;
    var localNewer = (local.updated_at || 0) >= (cloud.updated_at || 0);
    var newer = localNewer ? local : cloud;
    var older = localNewer ? cloud : local;
    function mergeById(arrNewer, arrOlder) {
        var map = {};
        (arrOlder || []).forEach(function(x) { if (x && x.id) map[x.id] = x; });
        (arrNewer || []).forEach(function(x) { if (x && x.id) map[x.id] = x; });
        return Object.keys(map).map(function(k) { return map[k]; });
    }
    return {
        profile: newer.profile || older.profile,
        customs: mergeById(newer.customs, older.customs),
        setlists: mergeById(newer.setlists, older.setlists),
        favorites: Array.from(new Set((local.favorites || []).concat(cloud.favorites || []))),
        transpose: Object.assign({}, older.transpose, newer.transpose),
        capo: Object.assign({}, older.capo, newer.capo),
        settings: newer.settings || older.settings,
        updated_at: Math.max(local.updated_at || 0, cloud.updated_at || 0)
    };
}

async function pushCloud() {

async function syncNow() {
    if (!currentUser || !supa) return;

        var cloud = await pullCloud();

        await pushCloud();
        rerenderCurrent();

    } catch (e) { console.warn('sync failed', e); }

async function approveSubmission(id) {
    if (!isAdmin() || !supa) return;
    try {
        var got = await supa.from('submissions').select('*').eq('id', id).single();
        if (got.error) throw got.error;
        var s = got.data;
        var songId = s.song_id;
        if (!songId) {
            // brand-new song: mint a unique catalog id and create the row
            songId = slugify(s.title);
            var exists = await supa.from('songs').select('id').eq('id', songId).maybeSingle();
            if (exists.data) songId = songId + '-' + Date.now().toString(36).slice(-4);
            var ins = await supa.from('songs').insert({
                id: songId, title: s.title, artist: s.artist, key: s.key,
                tempo: s.tempo || null, feel: s.feel || null, tags: s.tags || [], chart: s.chart
            });
            if (ins.error) throw ins.error;
        }
        var v = await supa.from('song_versions').insert({
            song_id: songId, contributor_email: s.submitter_email, key: s.key,
            type: s.type, instrument: s.instrument, reference_url: s.reference_url, chart: s.chart
        });
        if (v.error) throw v.error;
        var up = await supa.from('submissions').update({ status: 'approved', reviewed_at: new Date().toISOString() }).eq('id', id);
        if (up.error) throw up.error;
        toast('Approved.');

        renderReview(); refreshReviewBadge();
    } catch (e) { toast('Approve failed: ' + (e.message || e)); }

/* One-time migration from the index-based v1 (worshipapp_*) data */
function migrate() {
    if (localStorage.getItem('chordph2_migrated')) return;
    try {
        var oldMus = JSON.parse(localStorage.getItem('worshipapp_musician') || 'null');
        var oldCustoms = JSON.parse(localStorage.getItem('worshipapp_custom_songs') || '[]');
        var oldFavs = JSON.parse(localStorage.getItem('worshipapp_favorites') || '[]');
        var oldSetlists = JSON.parse(localStorage.getItem('worshipapp_setlists') || '[]');
        var oldSteps = JSON.parse(localStorage.getItem('worshipapp_song_settings') || '{}');
        var oldFont = localStorage.getItem('worshipapp_fontsize');

        // v1 song index -> v2 id (customs were appended after the 13 builtins,
        // in stored order, INCLUDING soft-deleted ones)
        function idForIndex(i) {
            i = parseInt(i, 10);
            if (i >= 0 && i < BUILTIN_IDS.length) return BUILTIN_IDS[i];
            var c = oldCustoms[i - BUILTIN_IDS.length];
            if (c && !c.deleted) return 'c' + c.id;
            return null;
        }

        if (oldMus && oldMus.name) state.profile = { name: oldMus.name, instrument: oldMus.instrument || 'Vocalist' };
        state.customs = oldCustoms.filter(function(c) { return !c.deleted; }).map(function(c) {
            return { id: 'c' + c.id, title: c.title, artist: c.artist, key: c.key,
                     tempo: c.tempo || 0, feel: c.feel || '', chart: c.chart, custom: true };
        });
        state.favorites = oldFavs.map(idForIndex).filter(Boolean);
        state.setlists = oldSetlists.map(function(sl, n) {
            return { id: 's' + (Date.now() + n), name: sl.name, songIds: (sl.songs || []).map(idForIndex).filter(Boolean) };
        });
        Object.keys(oldSteps).forEach(function(k) {
            var id = idForIndex(k);
            if (id && oldSteps[k]) state.transpose[id] = oldSteps[k];
        });
        if (oldFont) state.fontSize = parseInt(oldFont, 10) || 16;
        save();
    } catch (e) { console.warn('migration failed', e); }
    localStorage.setItem('chordph2_migrated', '1');

/* =========================================================
   SONG ACCESS
   ========================================================= */
function allSongs() { return LIBRARY.concat(state.customs); }
function songById(id) {
    for (var i = 0; i < LIBRARY.length; i++) if (LIBRARY[i].id === id) return LIBRARY[i];
    for (var j = 0; j < state.customs.length; j++) if (state.customs[j].id === id) return state.customs[j];
    return null;

/* Shared library: cache-first for instant/offline paint, then refresh from cloud. */
function fetchLibrary() {
    if (!SUPABASE_CONFIG.url || !SUPABASE_CONFIG.anonKey) return;
    var url = SUPABASE_CONFIG.url + '/rest/v1/songs?select=id,title,artist,key,tempo,feel,chart,tags&order=title';
    fetch(url, { headers: { apikey: SUPABASE_CONFIG.anonKey, Authorization: 'Bearer ' + SUPABASE_CONFIG.anonKey } })
        .then(function(r) { return r.ok ? r.json() : null; })
        .then(function(rows) {
            if (!rows || !rows.length) return;          // never blank out a good cache
            LIBRARY = rows;
            localStorage.setItem('chordph2_library', JSON.stringify(rows));
            rerenderCurrent();
        })
        .catch(function(e) { console.warn('library fetch failed', e); });
}

   SONG LIST / FAVORITES

function songRow(song, opts) {

var songFilterTags = [];   // active tag filters in the songs view (session)
function songTags(s) { return (s && s.tags) || []; }
function parseTags(str) {
    return (str || '').split(',').map(function(t) {
        t = t.trim().replace(/\s+/g, ' ');
        return t ? t.charAt(0).toUpperCase() + t.slice(1) : '';   // Title-case first letter
    }).filter(Boolean).filter(function(t, i, a) { return a.indexOf(t) === i; }).slice(0, 8);
}
function matchesQuery(s, q) {
    if (!q) return true;
    if (s.title.toLowerCase().indexOf(q) !== -1) return true;
    if ((s.artist || '').toLowerCase().indexOf(q) !== -1) return true;
    return songTags(s).some(function(t) { return t.toLowerCase().indexOf(q) !== -1; });
}
function hasAllTags(s, tags) {
    var st = songTags(s);
    return tags.every(function(t) { return st.indexOf(t) !== -1; });
}
function renderTagFilter() {
    var el = document.getElementById('tag-filter');
    if (!el) return;
    var counts = {};
    allSongs().forEach(function(s) { songTags(s).forEach(function(t) { counts[t] = (counts[t] || 0) + 1; }); });
    var tags = Object.keys(counts).sort(function(a, b) { return counts[b] - counts[a] || a.localeCompare(b); });
    // keep any active tag visible even if it momentarily has no matches
    songFilterTags.forEach(function(t) { if (tags.indexOf(t) === -1) tags.push(t); });
    if (!tags.length) { el.innerHTML = ''; el.style.display = 'none'; return; }
    el.style.display = 'flex';
    var chips = tags.map(function(t) {
        var on = songFilterTags.indexOf(t) !== -1;
        return '<button class="tag-chip' + (on ? ' on' : '') + '" onclick="toggleTagFilter(\'' + esc(t).replace(/'/g, "\\'") + '\')">' + esc(t) + '</button>';
    });
    if (songFilterTags.length) chips.unshift('<button class="tag-chip" onclick="clearTagFilter()">Clear ✕</button>');
    el.innerHTML = chips.join('');
}
function toggleTagFilter(t) {
    var i = songFilterTags.indexOf(t);
    if (i === -1) songFilterTags.push(t); else songFilterTags.splice(i, 1);
    renderSongList();
}
function clearTagFilter() { songFilterTags = []; renderSongList(); }
function renderSongList() {
    var q = (document.getElementById('search').value || '').toLowerCase();

    box.innerHTML = '';

        return matchesQuery(s, q) && hasAllTags(s, songFilterTags);
    });
    if (!list.length) {
        box.innerHTML = '<div class="empty">No songs match.</div>';

    }

}

function renderFavorites() {

/* =========================================================
   CHART VIEW
   ========================================================= */
function openChart(songId, from) {
    currentSongId = songId;
    state.chartFrom = from || 'songs';
    // medley is remembered per setlist; from the library it starts empty
    if (state.chartFrom === 'setlist' && state.currentSetlistId) {
        var sl = setlistById(state.currentSetlistId);
        state.medley = (sl && sl.medleys && sl.medleys[songId] || []).slice();
    } else {
        state.medley = [];
    }
    state.openLayer = null;
    renderChart();
    show('chart');
}
function chartBack() {
    if (state.chartFrom === 'setlist') { openSetlist(state.currentSetlistId); }
    else go(state.chartFrom);
}
function viewFor() {
    return INSTRUMENT_VIEWS[state.profile ? state.profile.instrument : 'Vocalist'] || 'vocalist';
}

function renderChart() {
    var song = songById(currentSongId);
    if (!song) { go('songs'); return; }
    var steps = state.transpose[song.id] || 0;
    var keyIdx = currentKeyIndex(song);       // sounding key (what the singer hears)
    var view = viewFor();
    var isGuitar = view === 'guitarist';
    var capo = isGuitar ? (state.capo[song.id] || 0) : 0;  // capo only applies to guitar fingering
    var displaySteps = steps - capo;          // chords the guitarist actually fingers
    var fingeredKeyIdx = ((keyIdx - capo) % 12 + 12) % 12;

    document.getElementById('chart-back').innerHTML =
        state.chartFrom === 'setlist' ? '&lsaquo; Setlist' :
        state.chartFrom === 'favorites' ? '&lsaquo; Favorites' : '&lsaquo; Songs';
    document.getElementById('chart-title').textContent = song.title;
    var meta = esc(song.artist) + ' &middot; Key of <span class="key" onclick="toggleLayer(\'transpose\')">' + esc(noteName(keyIdx)) + '</span>';
    if (song.tempo) meta += ' &middot; ' + song.tempo + ' BPM';
    if (capo > 0) meta += ' &middot; <span class="key" onclick="toggleLayer(\'capo\')">Capo ' + capo +
        ' &rarr; ' + esc(noteName(fingeredKeyIdx)) + ' shapes</span>';
    document.getElementById('chart-meta').innerHTML = meta;
    renderChartVersions(song.id);

    var star = document.getElementById('chart-star');
    star.innerHTML = isFav(song.id) ? '&#9733;' : '&#9734;';
    star.style.color = isFav(song.id) ? 'var(--gold)' : '';
    document.getElementById('chart-edit').style.display = song.custom ? 'inline-block' : 'none';

    // setlist prev/next
    var inSetlist = state.chartFrom === 'setlist';
    var prev = document.getElementById('chart-prev'), next = document.getElementById('chart-next');
    prev.style.display = next.style.display = inSetlist ? 'inline-block' : 'none';
    if (inSetlist) {
        var sl = setlistById(state.currentSetlistId);
        prev.disabled = state.setlistPos <= 0;
        next.disabled = !sl || state.setlistPos >= sl.songIds.length - 1;
    }

    // controls: capo only for guitarists
    document.getElementById('ctl-capo').style.display = view === 'guitarist' ? 'inline-block' : 'none';
    if (view !== 'guitarist' && state.openLayer === 'capo') state.openLayer = null;

    // layers — show transpose as the shortest signed move (−5..+6), not a raw counter
    var disp = steps > 6 ? steps - 12 : steps;
    document.getElementById('transpose-val').textContent = disp === 0 ? '0' : (disp > 0 ? '+' + disp : '' + disp);
    document.getElementById('notation-sharp').classList.toggle('on', !state.useFlats);
    document.getElementById('notation-flat').classList.toggle('on', state.useFlats);
    document.getElementById('font-val').textContent = state.fontSize;
    document.getElementById('scroll-val').textContent = state.scroll.speed;
    renderCapoLayer(song, keyIdx);
    // Click control needs a tempo; hide it (and its layer) on tempo-less songs
    document.getElementById('ctl-click').style.display = song.tempo ? 'inline-block' : 'none';
    if (!song.tempo && state.openLayer === 'click') state.openLayer = null;
    document.getElementById('click-bpm').textContent = song.tempo ? song.tempo + ' BPM' : '—';
    ['transpose', 'capo', 'text', 'scroll', 'click'].forEach(function(l) {
        document.getElementById('layer-' + l).classList.toggle('open', state.openLayer === l);
        document.getElementById('ctl-' + l).classList.toggle('on', state.openLayer === l);
    });
    document.getElementById('ctl-numbers').classList.toggle('on', state.nashville);
    document.getElementById('ctl-diagrams').classList.toggle('on', state.showDiagrams);

    // body
    var body = document.getElementById('chart-body');
    body.style.fontSize = state.fontSize + 'px';
    var displayedChart = transposeChordText(song.chart, displaySteps);
    if (view === 'drummer') {
        body.innerHTML = formatChart('Feel: ' + (song.feel || '—') + '\nTempo: ' + (song.tempo ? song.tempo + ' BPM' : '—') + '\n\n' + song.chart);
    } else if (state.nashville) {
        body.innerHTML = formatChartNashville(song.chart, getNoteIndex(song.key));  // key-relative; transpose/capo don't change numbers
    } else {
        body.innerHTML = formatChart(displayedChart);
    }

    // chord diagram strip (guitar fingering for each unique fingered chord)
    var strip = document.getElementById('chord-strip');
    if (state.showDiagrams && view !== 'drummer' && !state.nashville) {
        renderChordStrip(strip, displayedChart);
        strip.style.display = 'flex';
    } else {
        strip.style.display = 'none';
    }
    renderMedley(song, keyIdx, capo);
}
function renderChordStrip(strip, chartText) {
    var names = uniqueChords(chartText);
    var html = names.map(function(n) {
        var shape = getGuitarShape(n);
        return shape ? renderChordDiagram(n, shape) : '';

    strip.innerHTML = html || '<span class="cd-missing">No diagrams for these chords.</span>';
}
function toggleNashville() {

}
function toggleDiagrams() {

}

/* Capo picker. keyIdx = sounding key. Capo keeps the sounding key; it only
   changes which open-chord SHAPE the guitarist fingers. Tapping a shape sets
   the capo fret that makes that shape sound in the current key. */
function renderCapoLayer(song, keyIdx) {
    var layer = document.getElementById('layer-capo');
    layer.innerHTML = '';
    var capo = state.capo[song.id] || 0;

    var none = document.createElement('button');
    none.className = 'tap capo-opt' + (capo === 0 ? ' on' : '');
    none.innerHTML = '<b>No capo</b>';
    none.onclick = function() { state.capo[song.id] = 0; save(); renderChart(); };
    layer.appendChild(none);

    CAPO_SHAPES.forEach(function(item) {
        var capoFret = (keyIdx - item.index + 12) % 12;   // fret to sound in the current key
        if (capoFret === 0) return;                        // that's "No capo" — already shown
        var isActive = capo === capoFret;
        var b = document.createElement('button');
        b.className = 'tap capo-opt' + (isActive ? ' on' : '');
        b.innerHTML = '<b>' + item.shape + '</b> <span>capo ' + capoFret + '</span>';
        b.onclick = function() { state.capo[song.id] = capoFret; save(); renderChart(); };
        layer.appendChild(b);
    });
}

function toggleLayer(name) {
    state.openLayer = state.openLayer === name ? null : name;
    renderChart();
}
function transposeBy(d) {
    // keep stored steps in 0..11 (matches capo's stepsToShape range); the
    // display converts to signed. Chord math is mod-12 either way.
    var v = (state.transpose[currentSongId] || 0) + d;
    state.transpose[currentSongId] = ((v % 12) + 12) % 12;
    save(); renderChart();
}
function resetTranspose() {
    state.transpose[currentSongId] = 0;
    save(); renderChart();
}
function setNotation(flats) {
    state.useFlats = flats;
    save(); renderChart();
}
function fontBy(d) {
    state.fontSize = Math.max(12, Math.min(28, state.fontSize + d));
    save(); renderChart();
}

/* ---- autoscroll ---- */
function toggleScroll() {
    if (state.scroll.playing) stopScroll();
    else {
        state.scroll.playing = true;
        document.getElementById('scroll-toggle').innerHTML = '&#10074;&#10074; Pause';
        var acc = 0;
        function step() {
            if (!state.scroll.playing) return;
            acc += state.scroll.speed * 0.18;   // gentler: speed 1 crawls, 5 is a moderate read
            if (acc >= 1) {
                var px = Math.floor(acc); acc -= px;
                window.scrollBy(0, px);
                if (window.innerHeight + window.scrollY >= document.body.scrollHeight - 2) { stopScroll(); return; }
            }
            state.scroll.raf = requestAnimationFrame(step);
        }
        state.scroll.raf = requestAnimationFrame(step);
    }
}
function stopScroll() {
    state.scroll.playing = false;
    if (state.scroll.raf) cancelAnimationFrame(state.scroll.raf);
    var b = document.getElementById('scroll-toggle');
    if (b) b.innerHTML = '&#9654; Play';
}
function scrollSpeedBy(d) {
    state.scroll.speed = Math.max(1, Math.min(5, state.scroll.speed + d));
    document.getElementById('scroll-val').textContent = state.scroll.speed;
}

/* ---- click / metronome (Web Audio, accent on beat 1 of 4/4) ---- */
var metro = { playing: false, ctx: null, next: 0, beat: 0, timer: null, bpm: 120 };
function startMetro(bpm) {
    if (metro.playing || !bpm) return;
    try { metro.ctx = metro.ctx || new (window.AudioContext || window.webkitAudioContext)(); } catch (e) { return; }
    if (metro.ctx.state === 'suspended') metro.ctx.resume();
    metro.bpm = bpm; metro.beat = 0; metro.next = metro.ctx.currentTime + 0.08; metro.playing = true;
    var b = document.getElementById('click-toggle');
    if (b) b.innerHTML = '&#10074;&#10074; Stop';
    scheduleMetro();
}
function scheduleMetro() {
    if (!metro.playing) return;
    var spb = 60 / metro.bpm;
    while (metro.next < metro.ctx.currentTime + 0.2) {
        var accent = metro.beat % 4 === 0;
        clickAt(metro.next, accent);
        (function(t, ac) {
            setTimeout(function() { pulseClickDot(ac); }, Math.max(0, (t - metro.ctx.currentTime) * 1000));
        })(metro.next, accent);
        metro.next += spb; metro.beat++;
    }
    metro.timer = setTimeout(scheduleMetro, 40);
}
function clickAt(time, accent) {
    var o = metro.ctx.createOscillator(), g = metro.ctx.createGain();
    o.frequency.value = accent ? 1600 : 950;
    g.gain.setValueAtTime(accent ? 0.5 : 0.28, time);
    g.gain.exponentialRampToValueAtTime(0.001, time + 0.05);
    o.connect(g); g.connect(metro.ctx.destination);
    o.start(time); o.stop(time + 0.06);
}
function pulseClickDot(accent) {
    var dot = document.getElementById('click-dot');
    if (!dot) return;
    dot.style.background = accent ? 'var(--accent-2)' : 'var(--accent)';
    dot.classList.remove('pulse'); void dot.offsetWidth; dot.classList.add('pulse');
}
function stopMetro() {
    metro.playing = false;
    if (metro.timer) clearTimeout(metro.timer);
    var b = document.getElementById('click-toggle');
    if (b) b.innerHTML = '&#9654; Start';
}
function toggleMetro() {
    var song = songById(currentSongId);
    if (metro.playing) stopMetro();
    else if (song && song.tempo) startMetro(song.tempo);
}

/* ---- medley ---- */
function renderMedley(mainSong, keyIdx, capo) {
    capo = capo || 0;
    var box = document.getElementById('medley-blocks');
    box.innerHTML = '';
    var view = viewFor();
    state.medley.forEach(function(m, i) {
        var song = songById(m.songId);
        if (!song) return;
        var steps = m.keyOption === 'match' ? getStepsToReach(song.key, noteName(keyIdx)) : 0;
        var dispKey = noteName((getNoteIndex(song.key) + steps + 12) % 12);
        var block = document.createElement('div');
        block.className = 'medley-sep';
        var head = document.createElement('div');

        rm.textContent = 'Remove';
        rm.onclick = function() {

        };
        head.appendChild(rm);
        var title = document.createElement('div');
        title.className = 'medley-title';
        title.textContent = song.title;
        var sub = document.createElement('div');
        sub.className = 'medley-sub';
        var partsNote = '';
        if (m.sectionIndices) {
            var allSecs = parseSections(song.chart);
            var names = m.sectionIndices.map(function(idx) { return allSecs[idx] ? allSecs[idx].label : null; }).filter(Boolean);
            if (names.length && names.length < allSecs.length) partsNote = ' · ' + names.join(', ');
        }
        sub.textContent = song.artist + ' · Key of ' + dispKey + (m.keyOption === 'match' ? ' (matched)' : ' (original)') + partsNote;
        var chartText = medleyChartText(song, m.sectionIndices);

        pre.style.fontSize = state.fontSize + 'px';
        pre.innerHTML = view === 'drummer'
            ? formatChart('Feel: ' + (song.feel || '—') + '\nTempo: ' + (song.tempo || '—') + ' BPM\n\n' + chartText)
            : state.nashville
                ? formatChartNashville(chartText, getNoteIndex(song.key))
                : formatChart(transposeChordText(chartText, steps - capo));
        block.appendChild(head); block.appendChild(title); block.appendChild(sub); block.appendChild(pre);
        box.appendChild(block);
    });
}

/* ---- generic drag-to-reorder (long-press to lift, pointer events) ----
   cfg = { container, selector, onDrop(from, to) } */
var slDrag = null;
function dragRowPointerDown(e, row, pos, cfg) {
    if (e.target.closest('.row-action')) return;   // Delete/Remove button, not a drag
    var startY = e.clientY;
    var timer = setTimeout(function() { cleanup(); startDrag(row, pos, startY, cfg); }, 300);
    function move(ev) { if (Math.abs(ev.clientY - startY) > 12) cleanup(); }  // scrolling, not holding
    function up() { cleanup(); }
    function cleanup() {
        clearTimeout(timer);
        document.removeEventListener('pointermove', move);
        document.removeEventListener('pointerup', up);
    }
    document.addEventListener('pointermove', move);
    document.addEventListener('pointerup', up);
}
function startDrag(row, pos, startY, cfg) {
    var container = cfg.container;
    var rows = Array.prototype.slice.call(container.querySelectorAll(cfg.selector));
    var rect = row.getBoundingClientRect();
    var clone = row.cloneNode(true);
    clone.classList.add('drag-clone');
    clone.style.left = rect.left + 'px';
    clone.style.top = rect.top + 'px';
    clone.style.width = rect.width + 'px';
    document.body.appendChild(clone);
    row.style.opacity = '0.25';
    document.body.classList.add('dragging');
    try { var sel = window.getSelection && window.getSelection(); if (sel && sel.removeAllRanges) sel.removeAllRanges(); } catch (e) {}
    var indicator = document.createElement('div');
    indicator.className = 'drop-indicator';
    container.appendChild(indicator);
    slDrag = { row: row, pos: pos, clone: clone, indicator: indicator, rows: rows,
               container: container, grabDy: startY - rect.top, target: pos, onDrop: cfg.onDrop };
    if (navigator.vibrate) { try { navigator.vibrate(12); } catch (e) {} }
    document.addEventListener('pointermove', onDragMove, { passive: false });
    document.addEventListener('pointerup', onDragEnd);
    positionDropIndicator(startY);
}
function positionDropIndicator(clientY) {
    var d = slDrag;
    var contTop = d.container.getBoundingClientRect().top;
    var target = d.rows.length;
    for (var i = 0; i < d.rows.length; i++) {
        var r = d.rows[i].getBoundingClientRect();
        if (clientY < r.top + r.height / 2) { target = i; break; }
    }
    d.target = target;
    var y;
    if (target >= d.rows.length) { var last = d.rows[d.rows.length - 1].getBoundingClientRect(); y = last.bottom - contTop; }
    else { y = d.rows[target].getBoundingClientRect().top - contTop; }
    d.indicator.style.top = y + 'px';
}
function onDragMove(e) {
    if (!slDrag) return;
    e.preventDefault();
    slDrag.clone.style.top = (e.clientY - slDrag.grabDy) + 'px';
    positionDropIndicator(e.clientY);
}
function onDragEnd() {
    if (!slDrag) return;
    document.removeEventListener('pointermove', onDragMove, { passive: false });
    document.removeEventListener('pointerup', onDragEnd);
    var from = slDrag.pos, to = slDrag.target, cb = slDrag.onDrop;
    slDrag.clone.remove();
    slDrag.indicator.remove();
    slDrag.row.style.opacity = '';
    slDrag = null;
    document.body.classList.remove('dragging');
    if (from !== to) cb(from, to);
    else cb(-1, -1); // no move, but let caller re-render
}
/* splice helper: move item from -> to within an array (to is pre-removal index) */
function arrayMove(arr, from, to) {
    var it = arr.splice(from, 1)[0];
    if (to > from) to--;
    arr.splice(to, 0, it);
}
function setlistStep(dir) {
    var sl = setlistById(state.currentSetlistId);
    if (!sl) return;
    var pos = state.setlistPos + dir;
    while (pos >= 0 && pos < sl.songIds.length && !songById(sl.songIds[pos])) pos += dir;
    if (pos < 0 || pos >= sl.songIds.length) return;
    state.setlistPos = pos;
    openChart(sl.songIds[pos], 'setlist');
}

function medleyStep2(songId) {

function medleyKeyOpt(opt) {
    if (!medleyPick) return;
    medleyPick.keyOption = opt;
    document.getElementById('mk-same').classList.toggle('on', opt === 'same');
    document.getElementById('mk-match').classList.toggle('on', opt === 'match');

function toggleMedleySection(i) {
    if (!medleyPick) return;
    var pos = medleyPick.sections.indexOf(i);

function confirmMedley() {
    if (!medleyPick) return;

        var err = document.getElementById('sh-medley-err');
        err.textContent = 'Pick at least one part.';
        err.style.display = 'block';
        return;
    }
    var song = songById(medleyPick.songId);
    var total = parseSections(song.chart).length;
    var chosen = medleyPick.sections.slice().sort(function(a, b) { return a - b; });
    state.medley.push({
        songId: medleyPick.songId,
        keyOption: medleyPick.keyOption,
        sectionIndices: chosen.length === total ? null : chosen  // null = whole song
    });

    persistMedley();
    closeSheet(); renderChart();
}

        '<textarea class="field" id="sh-song-chart" placeholder="Chord chart *&#10;&#10;[Verse 1]&#10;G              D&#10;Your lyrics here">' + (song ? esc(song.chart) : '') + '</textarea>' +
        '<div class="form-error" id="sh-song-err"></div>' +
        '<div class="sheet-actions">' +
        (song ? '<button class="tap danger" onclick="deleteSong()">Delete</button>' : '') +
        '<button class="tap" onclick="closeSheet()">Cancel</button>' +
        '<button class="tap primary" onclick="saveSong()">Save</button></div>'
    );
}
function saveSong() {
    var title = document.getElementById('sh-song-title').value.trim();
    var artist = document.getElementById('sh-song-artist').value.trim();
    var key = document.getElementById('sh-song-key').value;
    var tempo = parseInt(document.getElementById('sh-song-tempo').value, 10) || 0;
    var feel = document.getElementById('sh-song-feel').value;
    var tags = parseTags(document.getElementById('sh-song-tags').value);
    var chart = document.getElementById('sh-song-chart').value.trim();
    var err = document.getElementById('sh-song-err');
    if (!title || !artist || !key || !chart) {
        err.textContent = 'Title, artist, key and chart are required.';
        err.style.display = 'block';
        return;
    }
    if (editingSongId) {
        var song = songById(editingSongId);
        song.title = title; song.artist = artist; song.key = key;
        song.tempo = tempo; song.feel = feel; song.tags = tags; song.chart = chart;
    } else {
        state.customs.push({ id: 'c' + Date.now(), title: title, artist: artist, key: key,
                             tempo: tempo, feel: feel, tags: tags, chart: chart, custom: true });
    }
    save(); closeSheet();
    if (state.view === 'songs') renderSongList();
    if (document.getElementById('view-chart').classList.contains('active')) renderChart();
    if (document.getElementById('view-setlist').classList.contains('active')) renderSetlistDetail();
}
function deleteSong() {
    if (!editingSongId || !confirm('Delete this song permanently?')) return;
    var id = editingSongId;
    state.customs = state.customs.filter(function(c) { return c.id !== id; });
    state.favorites = state.favorites.filter(function(f) { return f !== id; });
    state.setlists.forEach(function(sl) {
        sl.songIds = sl.songIds.filter(function(s) { return s !== id; });
    });
    delete state.transpose[id];
    delete state.capo[id];
    // purge the song from every setlist's medleys (as host and as an appended part)
    state.setlists.forEach(function(sl) {
        if (!sl.medleys) return;
        delete sl.medleys[id];
        Object.keys(sl.medleys).forEach(function(host) {
            sl.medleys[host] = sl.medleys[host].filter(function(m) { return m.songId !== id; });
            if (!sl.medleys[host].length) delete sl.medleys[host];
        });
    });
    save(); closeSheet();
    editingSongId = null;
    go('songs');
}

            esc(currentUser.email || 'you') + '</b> &middot; synced across your devices.</div>' +
            '<div style="display:flex;gap:24px;"><button class="tap" onclick="syncNow()">Sync now</button>' +
            '<button class="tap danger" onclick="signOut()">Sign out</button></div>';
    }
    return '<div style="font-size:13px;color:var(--muted);margin-bottom:8px;">Sign in to sync your songs and setlists across phone and PC. We\'ll email you a one-tap link.</div>' +
        '<input class="field" id="sh-sync-email" type="email" placeholder="you@email.com" autocomplete="email">' +
        '<div id="sh-sync-msg" style="font-size:12px;color:var(--accent);margin:2px 0 6px;"></div>' +
        '<button class="tap primary" onclick="submitMagicLink()">Send sign-in link</button>';
}
async function submitMagicLink() {
    var email = (document.getElementById('sh-sync-email').value || '').trim();
    var msg = document.getElementById('sh-sync-msg');
    if (!email) { msg.style.color = 'var(--danger)'; msg.textContent = 'Enter your email.'; return; }
    msg.style.color = 'var(--muted)';
    msg.textContent = 'Sending…';
    var err = await sendMagicLink(email);
    if (err) { msg.style.color = 'var(--danger)'; msg.textContent = err; }
    else { msg.style.color = 'var(--accent)'; msg.textContent = 'Check your email for the sign-in link.'; }
}
function pickInstrument(el, ins) {
    window.__pickedInstrument = ins;
    document.querySelectorAll('#sh-instruments .chip').forEach(function(c) { c.classList.remove('on'); });
    el.classList.add('on');
}
function saveSettings() {
    var name = document.getElementById('sh-profile-name').value.trim();
    if (!name || !window.__pickedInstrument) return;
    state.profile = { name: name, instrument: window.__pickedInstrument };
    save(); closeSheet(); updateProfileRow();
    if (document.getElementById('view-chart').classList.contains('active')) renderChart();
}
function exportBackup() {
    var blob = new Blob([JSON.stringify({
        version: '2.0', exportDate: new Date().toISOString(),
        profile: state.profile, customs: state.customs, favorites: state.favorites,
        setlists: state.setlists, transpose: state.transpose, capo: state.capo,
        settings: { fontSize: state.fontSize, useFlats: state.useFlats, nashville: state.nashville }
    }, null, 2)], { type: 'application/json' });
    var a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'chordph-backup-' + new Date().toISOString().slice(0, 10) + '.json';
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    URL.revokeObjectURL(a.href);
}
function importBackup(event) {
    var file = event.target.files[0];
    if (!file) return;
    var reader = new FileReader();
    reader.onload = function(e) {
        try {
            var b = JSON.parse(e.target.result);
            if (b.version === '2.0') {
                if (b.profile) state.profile = b.profile;
                if (b.customs) state.customs = b.customs;
                if (b.favorites) state.favorites = b.favorites;
                if (b.setlists) state.setlists = b.setlists;
                if (b.transpose) state.transpose = b.transpose;
                if (b.capo) state.capo = b.capo;
                if (b.settings) {
                    state.fontSize = b.settings.fontSize || 16;
                    state.useFlats = !!b.settings.useFlats;
                    state.nashville = !!b.settings.nashville;
                    state.showDiagrams = !!b.settings.showDiagrams;
                }
                save();
                alert('Backup restored.');
                location.reload();
            } else {
                alert('This looks like an old-format backup. Import it in the classic app first, then revisit this page to migrate.');
            }
        } catch (err) { alert('Not a valid Chord.ph backup file.'); }
    };
    reader.readAsText(file);
    event.target.value = '';
}

/* =========================================================
   ONBOARDING + INIT
   ========================================================= */
function renderOnboarding() {
    var box = document.getElementById('ob-instruments');
    box.innerHTML = '';
    INSTRUMENTS.forEach(function(ins) {
        var b = document.createElement('button');
        b.className = 'chip';
        b.textContent = ins;
        b.onclick = function() {
            window.__obInstrument = ins;
            box.querySelectorAll('.chip').forEach(function(c) { c.classList.remove('on'); });
            b.classList.add('on');
        };
        box.appendChild(b);
    });
    document.body.classList.add('pre-app');
    document.getElementById('view-onboarding').style.display = 'flex';
}
function finishOnboarding() {
    var name = document.getElementById('ob-name').value.trim();
    if (!name || !window.__obInstrument) return;
    state.profile = { name: name, instrument: window.__obInstrument };
    save();
    document.getElementById('view-onboarding').style.display = 'none';
    go('songs');
}

/* Left-edge swipe opens the drawer — so nav is reachable even when the top
   bar has scrolled away. Mobile only (desktop keeps the persistent sidebar).
   Passive listeners, so page scrolling is never blocked. */
function setupEdgeSwipe() {
    var sx = 0, sy = 0, tracking = false;
    document.addEventListener('touchstart', function(e) {
        tracking = false;
        if (window.innerWidth >= 980) return;
        if (document.getElementById('drawer').classList.contains('open')) return;
        if (document.body.classList.contains('pre-app')) return;
        var t = e.touches[0];
        if (t.clientX <= 22) { sx = t.clientX; sy = t.clientY; tracking = true; }
    }, { passive: true });
    document.addEventListener('touchmove', function(e) {
        if (!tracking) return;
        var t = e.touches[0], dx = t.clientX - sx, dy = t.clientY - sy;
        if (dx > 55 && Math.abs(dx) > Math.abs(dy) * 1.5) { tracking = false; openDrawer(); }
    }, { passive: true });
    document.addEventListener('touchend', function() { tracking = false; }, { passive: true });
}
function init() {
    migrate();
    load();
    if (state.profile && state.profile.name) go('songs');
    else renderOnboarding();
    fetchLibrary();     // shared cloud library — cache already painted, refresh in background
    initSync();
    setupEdgeSwipe();
}
init();
</script>
<input type="file" id="import-input" accept=".json" style="display:none;" onchange="importBackup(event)">
</body>
</html>
